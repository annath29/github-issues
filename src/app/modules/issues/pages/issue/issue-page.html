<h1>Issues number: <small>{{issuesNumber()}}</small></h1>

<a routerLink="/"> Regresar</a>

@if (issueQuery.isLoading()) {
    <div>Cargando ....</div>
}
@else {
   <issue-comment [issue]="issueQuery.data()!" />
}


<!-- coments -->
 @if (commentsQuery.isLoading()) {
    <div>Cargando comentarios ...</div>
 }
 @else {
    @for (comment of commentsQuery.data(); track comment.id) {
        <issue-comment [issue]="comment"/>
    }
    @empty {
        <div>No hay commentarios</div>
    }
 }
