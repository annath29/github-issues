<div class="flex flex-wrap justify-center items-center gap-2">
  @for (label of labels(); track label.id) {
    <div
      [ngStyle]="{ 'border-color': '#' + label.color }"
      class="bg-slate-950 border p-2 rounded-md hover:bg-slate-800 cursor-pointer"
      [class.selected-label]="isSelectedLabel(label.name)"
      (click)="onTooggleLabel(label.name)"
    >
      {{ label.name }}
    </div>
  }
</div>
